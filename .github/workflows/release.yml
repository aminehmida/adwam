name: Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      - uses: actions/cache@v6
        with:
          path: ~/.pub-cache
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-${{ runner.os }}-

      # Real release signing when keystore secrets are configured; otherwise
      # Gradle falls back to debug signing (see android/app/build.gradle.kts).
      - name: Set up release signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "Keystore secrets not set; falling back to debug signing."
            exit 0
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=upload-keystore.jks
          EOF

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Build APK
        run: |
          # Offset keeps versionCode above builds already installed from local deploys.
          BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          BUILD_NAME_ARG=()
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            BUILD_NAME_ARG=(--build-name "${GITHUB_REF_NAME#v}")
          fi
          flutter build apk --release --split-per-abi --target-platform android-arm64 \
            --build-number "$BUILD_NUMBER" "${BUILD_NAME_ARG[@]}"

      - name: Rename APK
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            LABEL="$GITHUB_REF_NAME"
          else
            LABEL="${GITHUB_SHA::7}"
          fi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "adwam-$LABEL-arm64-v8a.apk"

      - uses: actions/upload-artifact@v7
        with:
          name: apk
          path: adwam-*.apk

      - name: Publish GitHub release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v3
        with:
          files: adwam-*.apk
          generate_release_notes: true
