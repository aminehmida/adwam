name: Release APK

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.6"
          channel: stable
          cache: true

      # Real release signing when keystore secrets are configured; otherwise
      # Gradle falls back to debug signing (see android/app/build.gradle.kts).
      - name: Set up release signing
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - run: flutter pub get

      - run: flutter analyze

      - run: flutter test

      - name: Build APK
        run: |
          # Offset keeps versionCode above builds already installed from local deploys.
          BUILD_NUMBER=$((3000 + GITHUB_RUN_NUMBER))
          BUILD_NAME_ARG=()
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            BUILD_NAME_ARG=(--build-name "${GITHUB_REF_NAME#v}")
          fi
          flutter build apk --release --split-per-abi --target-platform android-arm64 \
            --build-number "$BUILD_NUMBER" "${BUILD_NAME_ARG[@]}"

      - name: Rename APK
        run: |
          if [[ "$GITHUB_REF_TYPE" == "tag" ]]; then
            LABEL="$GITHUB_REF_NAME"
          else
            LABEL="${GITHUB_SHA::7}"
          fi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "adwam-$LABEL-arm64-v8a.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          path: adwam-*.apk

      - name: Publish GitHub release
        if: ${{ github.ref_type == 'tag' }}
        uses: softprops/action-gh-release@v2
        with:
          files: adwam-*.apk
          generate_release_notes: true
