name: adwam
description: "Daily adhkar app — principled default ordering, per-context customization."
publish_to: 'none'

version: 1.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  provider: ^6.1.2
  shared_preferences: ^2.3.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0B3B32"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"
  adaptive_icon_monochrome: "assets/icon/icon_monochrome.png"

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/adhkar.json

  fonts:
    - family: Amiri
      fonts:
        - asset: assets/fonts/Amiri-Regular.ttf
        - asset: assets/fonts/Amiri-Bold.ttf
          weight: 700
    # Quran-specific cut of Amiri (same authors, SIL OFL): tashkeel and waqf
    # marks are positioned tightly over their letters for mushaf typesetting.
    # Used only for Quranic passages/surahs.
    - family: Amiri Quran
      fonts:
        - asset: assets/fonts/AmiriQuran-Regular.ttf
